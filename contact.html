<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Genivieve Duran</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-shell">
        <header class="top-nav">
            <nav class="main-nav" id="main-nav">
                <a href="index.html" class="nav-btn">Home</a>
                <a href="about.html" class="nav-btn">About</a>
                <a href="projects.html" class="nav-btn">Projects</a>
                <a href="contact.html" class="nav-btn is-active" aria-current="page">Contact</a>
            </nav>
            <div class="social-links" aria-label="Social links">
                <a href="#" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#" aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
                <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </header>

        <main class="contact-page">
            <section class="contact-page-card">
                <h1>Contact Me</h1>
                <p><strong>Gmail:</strong> <a href="mailto:genni@example.com">genni@example.com</a></p>
                <p><strong>Cellphone:</strong> +63 912 345 6789</p>
            </section>
            <section class="hire-form-card">
                <form class="hire-form" id="hire-form">
                    <input type="text" name="full_name" placeholder="Full Name" required>
                    <input type="email" name="email" placeholder="Email" required>
                    <input type="tel" name="phone" placeholder="Phone Number" required>
                    <input type="text" name="subject" placeholder="Subject" required>
                    <textarea name="message" placeholder="Your Message" rows="7" required></textarea>
                    <button type="submit">Send Message</button>
                </form>
                <p class="hire-form-note" id="hire-form-note" hidden>Thank you. Your hiring message has been sent.</p>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
